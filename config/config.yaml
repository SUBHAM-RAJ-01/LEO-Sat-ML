simulation:
  time_step: 0.1 # seconds per simulation tick
  max_timesteps: 800 # length of an episode (800 × 0.1s = 80s, more time for delivery)

constellation:
  orbit_model: "tle" # Can be "circular" or "tle"
  tle_url: "https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle"
  layers:
    - altitude_km: 500
      num_planes: 12
      sats_per_plane: 10
      inclination: 53.0
    - altitude_km: 800
      num_planes: 10
      sats_per_plane: 8
      inclination: 60.0
    - altitude_km: 1200
      num_planes: 6
      sats_per_plane: 8
      inclination: 70.0
  earth_radius_km: 6371.0
  speed_of_light_km_s: 299792.458

network:
  max_isl_distance_km: 8000.0 # Maximum distance for inter-satellite links (Increased to completely guarantee connectedness cross-layer)
  nearest_neighbors: 8 # Increased allowing ample cross-layer bridging
  link_capacity_mbps: 300.0 # Uniform initial capacity (can be randomized)
  queue_capacity_packets: 200

traffic:
  slices:
    urllc:
      priority: 1
      max_latency_ms: 10.0 # Relaxed slightly for initial training
      bandwidth_req_mbps: 10.0
      weight: 0.5
      packet_size_bytes: 256
    embb:
      priority: 2
      max_latency_ms: 50.0
      bandwidth_req_mbps: 100.0
      weight: 0.3
      packet_size_bytes: 1500
    mmtc:
      priority: 3
      max_latency_ms: 200.0
      bandwidth_req_mbps: 1.0
      weight: 0.2
      packet_size_bytes: 128
  generation_rate_packets_per_sec: 20
drl:
  algorithm: PPO
  learning_rate: 0.0003
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.03
  max_grad_norm: 0.5
  total_timesteps: 1000000
